<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MABUI Tokyo — Schedule Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;
  --text:#e8e8f0;--muted:#7a7a90;--gold:#c9a84c;--gold-light:#e8c97a;
  --akabane:#e05555;--warabi:#5599e0;--available:#4caf80;--booked:#e05555;--radius:10px;
}
html{background:var(--bg);color:var(--text);font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:14px}
body{min-height:100vh;padding-bottom:40px}
a{color:var(--gold);text-decoration:none}
a:hover{color:var(--gold-light);text-decoration:underline dotted}
.page-header{background:linear-gradient(135deg,#0d0d0f 0%,#1a1510 100%);border-bottom:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;gap:16px}
.page-header h1{font-size:1.3rem;font-weight:700;color:var(--gold);letter-spacing:.05em}
.page-header .subtitle{font-size:.8rem;color:var(--muted);margin-top:2px}
.page-header .badge{margin-left:auto;font-size:.7rem;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.container{max-width:1200px;margin:0 auto;padding:0 16px}
.tabs{display:flex;gap:4px;padding:16px 16px 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg)}
.tab-btn{padding:8px 18px;border-radius:var(--radius) var(--radius) 0 0;border:1px solid transparent;border-bottom:none;background:transparent;color:var(--muted);cursor:pointer;font:inherit;font-size:.85rem;transition:.2s}
.tab-btn:hover{color:var(--text);background:var(--surface)}
.tab-btn.active{background:var(--surface);color:var(--gold);border-color:var(--border)}
.tab-panel{display:none;padding:20px 0}
.tab-panel.active{display:block}
.fav-banner{background:linear-gradient(90deg,#1a160a,var(--surface2));border:1px solid #3a2e10;border-radius:var(--radius);padding:12px 18px;margin-bottom:20px}
.fav-banner h3{font-size:.75rem;color:var(--gold);letter-spacing:.1em;margin-bottom:8px}
.fav-cards{display:flex;flex-wrap:wrap;gap:8px}
.fav-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;display:flex;align-items:center;gap:10px;font-size:.82rem}
.fav-today-badge{background:var(--gold);color:#000;font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:4px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;text-align:center}
.metric-card .val{font-size:2rem;font-weight:700;color:var(--gold)}
.metric-card .lbl{font-size:.72rem;color:var(--muted);margin-top:2px}
.section-title{font-size:.75rem;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.room-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.room-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.room-card-header{padding:10px 14px;font-size:.8rem;font-weight:700;letter-spacing:.06em;display:flex;align-items:center;gap:8px}
.room-card-header.akabane{background:rgba(224,85,85,.12);border-bottom:2px solid var(--akabane);color:var(--akabane)}
.room-card-header.warabi{background:rgba(85,153,224,.12);border-bottom:2px solid var(--warabi);color:var(--warabi)}
.room-card-body{padding:10px 14px}
.staff-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.staff-row:last-child{border-bottom:none}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.available{background:var(--available)}
.status-dot.booked{background:var(--booked)}
.staff-name{flex:1}
.staff-time{color:var(--muted);font-size:.78rem;white-space:nowrap}
.booked-label{color:var(--booked);font-size:.72rem;font-weight:500}
.gantt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:24px;overflow-x:auto}
.gantt-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;font-size:.73rem;color:var(--muted);align-items:center}
.gantt-legend-item{display:flex;align-items:center;gap:5px}
.gantt-legend-swatch{width:24px;height:10px;border-radius:2px;flex-shrink:0}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:24px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.chart-card h4{font-size:.78rem;color:var(--muted);margin-bottom:12px;font-weight:500}
.heatmap-table{width:100%;border-collapse:collapse;font-size:.8rem}
.heatmap-table th,.heatmap-table td{padding:5px 10px;text-align:center;border:1px solid var(--border)}
.heatmap-table th{background:var(--surface2);color:var(--muted);font-weight:500}
.heatmap-0{background:var(--surface)}.heatmap-1{background:rgba(201,168,76,.15);color:var(--gold)}.heatmap-2{background:rgba(201,168,76,.30);color:var(--gold-light)}.heatmap-3{background:rgba(201,168,76,.50);color:var(--gold-light);font-weight:600}.heatmap-4{background:rgba(201,168,76,.75);color:#fff;font-weight:700}
.rank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:24px}
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.rank-card .rank-num{font-size:.7rem;color:var(--muted);margin-bottom:4px}
.rank-card .rank-name a{font-size:.95rem;font-weight:600;color:var(--text)}
.rank-card .rank-speed{display:inline-block;margin-top:6px;font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:4px}
.speed-lightning{background:rgba(224,85,85,.2);color:var(--booked)}.speed-moderate{background:rgba(234,179,8,.2);color:#eab308}.speed-gradual{background:rgba(76,175,128,.2);color:var(--available)}
.rank-bar-bg{background:var(--surface2);border-radius:4px;height:4px;margin-top:8px}
.rank-bar{background:var(--gold);height:4px;border-radius:4px}
.data-table{width:100%;border-collapse:collapse;font-size:.8rem}
.data-table th,.data-table td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.data-table th{background:var(--surface2);color:var(--muted);font-weight:500;white-space:nowrap}
.data-table tr:hover td{background:var(--surface2)}
.snapshot-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-bottom:20px}
.snapshot-table th,.snapshot-table td{padding:6px 10px;border-bottom:1px solid var(--border);text-align:left}
.snapshot-table th{background:var(--surface2);color:var(--muted)}
.status-available{color:var(--available)}.status-booked{color:var(--booked)}.success-ok{color:var(--available)}.success-ng{color:var(--booked)}
.no-data{color:var(--muted);font-size:.82rem;padding:20px;text-align:center}
.location-pill{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.7rem;font-weight:600}
.loc-akabane{background:rgba(224,85,85,.15);color:var(--akabane)}.loc-warabi{background:rgba(85,153,224,.15);color:var(--warabi)}
@media(max-width:600px){.tabs{overflow-x:auto;flex-wrap:nowrap}.tab-btn{white-space:nowrap;font-size:.78rem;padding:6px 12px}}
</style>
</head>
<body>
<div class="page-header">
  <div>
    <h1>🌺 MABUI Tokyo — Schedule Monitor</h1>
    <div class="subtitle">赤羽ルーム・蕨ルーム 出勤スケジュール可視化</div>
  </div>
  <div class="badge" id="genAt">---</div>
</div>
<div class="tabs container">
  <button class="tab-btn active" onclick="switchTab('today',this)">Today</button>
  <button class="tab-btn" onclick="switchTab('weekly',this)">Weekly</button>
  <button class="tab-btn" onclick="switchTab('stats',this)">Staff Stats</button>
  <button class="tab-btn" onclick="switchTab('log',this)">Monitor Log</button>
</div>

<!-- TODAY -->
<div id="tab-today" class="tab-panel active container">
  <div class="fav-banner" id="favBanner" style="display:none">
    <h3>⭐ お気に入りスタッフ 今週の出勤</h3>
    <div class="fav-cards" id="favCards"></div>
  </div>
  <div class="metrics" id="metrics"></div>
  <div class="section-title">今日の出勤スタッフ</div>
  <div class="room-grid" id="roomGrid"></div>
  <div class="section-title">タイムライン (Gantt)</div>
  <div class="gantt-wrap">
    <div class="gantt-legend" id="ganttLegend"></div>
    <div style="position:relative"><canvas id="ganttChart"></canvas></div>
  </div>
</div>

<!-- WEEKLY -->
<div id="tab-weekly" class="tab-panel container">
  <div class="chart-grid">
    <div class="chart-card"><h4>週間スタッフ数（店舗別）</h4><canvas id="weeklyBarChart" height="200"></canvas></div>
    <div class="chart-card"><h4>昼夜シフトバランス</h4><canvas id="shiftChart" height="200"></canvas></div>
  </div>
  <div class="section-title" style="margin-top:8px">ヒートマップ（店舗×日）</div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:24px;overflow-x:auto">
    <table class="heatmap-table" id="heatmapTable"></table>
  </div>
</div>

<!-- STAFF STATS -->
<div id="tab-stats" class="tab-panel container">
  <div class="section-title">人気度ランキング（予約埋まり速度）</div>
  <div id="rankGrid" class="rank-grid"></div>
  <div class="section-title">出勤頻度（直近30日）</div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:24px">
    <canvas id="freqChart" height="220"></canvas>
  </div>
  <div class="section-title">スタッフ詳細テーブル</div>
  <div style="overflow-x:auto;margin-bottom:24px">
    <table class="data-table">
      <thead><tr><th>名前</th><th>シフト数</th><th>平均時間</th><th>主な店舗</th><th>人気度</th></tr></thead>
      <tbody id="statsTableBody"></tbody>
    </table>
  </div>
</div>

<!-- MONITOR LOG -->
<div id="tab-log" class="tab-panel container">
  <div class="section-title">当日スナップショット履歴</div>
  <div style="overflow-x:auto;margin-bottom:24px">
    <table class="snapshot-table">
      <thead><tr><th>時刻</th><th>名前</th><th>店舗</th><th>状態</th><th>シフト</th></tr></thead>
      <tbody id="snapshotBody"></tbody>
    </table>
  </div>
  <div class="section-title">スクレイプ実行ログ（直近20件）</div>
  <div style="overflow-x:auto">
    <table class="data-table">
      <thead><tr><th>実行日時</th><th>タスク</th><th>対象日</th><th>件数</th><th>結果</th></tr></thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
</div>

<script>
const DATA = DASHBOARD_DATA_PLACEHOLDER;

// ── utils ──────────────────────────────────────────────────────────────────
function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}
const locClass=loc=>loc.includes('赤羽')?'akabane':loc.includes('蕨')?'warabi':'akabane';
const locPill=loc=>`<span class="location-pill loc-${locClass(loc)}">${loc}</span>`;
const therapistLink=(id,name)=>`<a href="https://mabuispa.com/therapist/${id}" target="_blank">${name}</a>`;

// 24H ゼロパディング (正規化済み "25:30" → "翌01:30")
function displayTime(t){
  if(!t)return'';
  const m=t.match(/^(\d+):(\d{2})$/);if(!m)return t;
  let h=parseInt(m[1]),mn=m[2],over=h>=24;
  if(over)h-=24;
  return`${over?'翌':''}${String(h).padStart(2,'0')}:${mn}`;
}
// "25:30" → 25.5 (Gantt数値)
function rawToFloat(t){
  if(!t)return null;
  const m=t.match(/^(\d+):(\d{2})$/);
  return m?parseInt(m[1])+parseInt(m[2])/60:null;
}
// float → "翌01:30" (ツールチップ)
function floatToDisplay(h){
  const over=h>=24,hh=Math.floor(over?h-24:h),mm=Math.round((h%1)*60);
  return`${over?'翌':''}${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}
// "2026-03-18 14:32:07" → float (JST, 深夜補正)
function checkedAtToFloat(s){
  const m=s.match(/(\d{2}):(\d{2}):\d{2}$/);if(!m)return null;
  const h=parseInt(m[1]),mn=parseInt(m[2]);
  return(h<6?h+24:h)+mn/60;
}
// "2026-03-18 14:32:07" → "14:32"
function checkedAtToHHMM(s){
  const m=s.match(/(\d{2}):(\d{2}):\d{2}$/);
  return m?`${m[1]}:${m[2]}`:'';
}

// ── meta ──────────────────────────────────────────────────────────────────
document.getElementById('genAt').textContent='更新: '+DATA.generated_at.replace('T',' ').slice(0,16);

// ── Favorites Banner ──────────────────────────────────────────────────────
(function(){
  const favs=DATA.favorites_config;
  if(!favs||!favs.length)return;
  document.getElementById('favBanner').style.display='';
  const today=DATA.today;
  const todaySch=DATA.favorites_schedule.filter(s=>s.schedule_date===today);
  const todayMap=Object.fromEntries(todaySch.map(s=>[s.therapist_id,s]));
  const html=favs.map(f=>{
    const sch=todayMap[f.therapist_id];
    const badge=sch?'<span class="fav-today-badge">TODAY</span>':'';
    const timeTag=sch?(sch.is_fully_booked
      ?` <span style="color:var(--booked);font-size:.72rem">【満了】</span>`
      :` <span style="color:var(--muted);font-size:.74rem">${displayTime(sch.start_time)}〜${displayTime(sch.end_time)}</span>`):'';
    const dates=DATA.favorites_schedule.filter(s=>s.therapist_id===f.therapist_id).map(s=>{
      const day=['日','月','火','水','木','金','土'][new Date(s.schedule_date).getDay()];
      return s.schedule_date.slice(5).replace('-','/')+'('+day+')'+(s.is_fully_booked?'🔴':'');
    }).join(', ');
    return`<div class="fav-card">${badge}<span>${therapistLink(f.therapist_id,f.name)}</span>${timeTag}<span style="color:var(--muted);font-size:.73rem">${dates||'No schedule'}</span></div>`;
  }).join('');
  document.getElementById('favCards').innerHTML=html||'<span style="color:var(--muted);font-size:.82rem">No favorite staff scheduled this week</span>';
})();

// ── TODAY TAB ─────────────────────────────────────────────────────────────
(function(){
  const today=DATA.today;
  const rec=DATA.weekly_schedules.filter(s=>s.schedule_date===today);

  // Metrics
  const total=rec.length,booked=rec.filter(s=>s.is_fully_booked).length;
  document.getElementById('metrics').innerHTML=[
    {val:total,lbl:'合計スタッフ'},{val:total-booked,lbl:'空き'},
    {val:booked,lbl:'予約満了'},{val:new Set(rec.map(s=>s.location)).size,lbl:'稼働店舗'},
  ].map(m=>`<div class="metric-card"><div class="val">${m.val}</div><div class="lbl">${m.lbl}</div></div>`).join('');

  // スナップショット解析: bookedAt / shiftFromSnap
  const bookedAtF={},bookedAtStr={},shiftSnap={};
  DATA.today_snapshots.forEach(s=>{
    if(s.status==='available'&&s.start_time&&!shiftSnap[s.therapist_id])
      shiftSnap[s.therapist_id]={start:s.start_time,end:s.end_time};
    if(s.status==='fully_booked'&&!bookedAtF[s.therapist_id]){
      const f=checkedAtToFloat(s.checked_at);
      if(f!==null){bookedAtF[s.therapist_id]=f;bookedAtStr[s.therapist_id]=checkedAtToHHMM(s.checked_at);}
    }
  });

  // Room cards
  const locOrder=['赤羽ルーム','蕨ルーム'],byLoc={};
  rec.forEach(r=>{if(!byLoc[r.location])byLoc[r.location]=[];byLoc[r.location].push(r);});
  document.getElementById('roomGrid').innerHTML=locOrder.filter(l=>byLoc[l]).map(loc=>{
    const cls=locClass(loc);
    const rows=(byLoc[loc]||[]).map(s=>{
      const dot=s.is_fully_booked?'booked':'available';
      const bStr=bookedAtStr[s.therapist_id];
      const timeTag=s.is_fully_booked
        ?`<span class="booked-label">${bStr?bStr+' 満了':'予約満了'}</span>`
        :`<span class="staff-time">${displayTime(s.start_time)}〜${displayTime(s.end_time)}</span>`;
      return`<div class="staff-row"><span class="status-dot ${dot}"></span><span class="staff-name">${therapistLink(s.therapist_id,s.therapist_name)}</span>${timeTag}</div>`;
    }).join('');
    return`<div class="room-card"><div class="room-card-header ${cls}">🏠 ${loc} <span style="margin-left:auto;font-size:.75rem;font-weight:400">${(byLoc[loc]||[]).length}名</span></div><div class="room-card-body">${rows}</div></div>`;
  }).join('')||'<div class="no-data">本日のスケジュールデータなし</div>';

  // ── Gantt ──────────────────────────────────────────────────────────────
  const HSTART=10,HEND=29;
  const C={
    '赤羽ルーム':{s:'rgba(224,85,85,.72)',sb:'#e05555',f:'rgba(224,85,85,.18)',fb:'rgba(224,85,85,.5)'},
    '蕨ルーム'  :{s:'rgba(85,153,224,.72)',sb:'#5599e0',f:'rgba(85,153,224,.18)',fb:'rgba(85,153,224,.5)'},
  };
  const labels=rec.map(r=>r.therapist_name);
  const sdArr=[],sdBg=[],sdBo=[];  // solid
  const fdArr=[],fdBg=[],fdBo=[];  // faded
  const mdArr=[],mdBg=[],mdBo=[];  // marker
  const annots={};

  // 現在時刻
  const nowJst=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));
  const nowH=nowJst.getHours()+nowJst.getMinutes()/60;
  const nowN=nowH<6?nowH+24:nowH;
  annots.nowLine={
    type:'line',scaleID:'x',value:nowN,
    borderColor:'rgba(255,80,80,.8)',borderWidth:2,borderDash:[4,3],
    label:{content:`Now ${String(nowJst.getHours()).padStart(2,'0')}:${String(nowJst.getMinutes()).padStart(2,'0')}`,
      display:true,position:'start',color:'#ff5050',font:{size:10},backgroundColor:'rgba(0,0,0,.7)'}
  };

  rec.forEach(r=>{
    const c=C[r.location]||C['赤羽ルーム'];
    const snap=shiftSnap[r.therapist_id];
    const sT=r.start_time||(snap?snap.start:null);
    const eT=r.end_time||(snap?snap.end:null);
    const sv=rawToFloat(sT),ev=rawToFloat(eT);
    const bAt=bookedAtF[r.therapist_id];

    if(!r.is_fully_booked){
      sdArr.push(sv&&ev?[sv,ev]:null);sdBg.push(c.s);sdBo.push(c.sb);
      fdArr.push(null);fdBg.push('');fdBo.push('');
      mdArr.push(null);mdBg.push('');mdBo.push('');
    } else {
      const hasTimes=sv!==null&&ev!==null;
      const splitOk=hasTimes&&bAt!=null&&bAt>sv&&bAt<ev;
      if(splitOk){
        // 分割: solid[start→booked] + faded[booked→end] + 赤マーカー
        sdArr.push([sv,bAt]);sdBg.push(c.s);sdBo.push(c.sb);
        fdArr.push([bAt,ev]);fdBg.push(c.f);fdBo.push(c.fb);
        mdArr.push([bAt-0.05,bAt+0.05]);mdBg.push('rgba(255,55,55,.95)');mdBo.push('#ff3333');
        annots['b'+r.therapist_id]={
          type:'label',xValue:bAt,yValue:r.therapist_name,
          content:[`${bookedAtStr[r.therapist_id]} 満了`],
          color:'#ff8080',font:{size:9,weight:'bold'},yAdjust:-14,
          backgroundColor:'rgba(0,0,0,.75)',
          padding:{top:2,bottom:2,left:4,right:4},borderRadius:3,
        };
      } else if(hasTimes){
        // 時刻あり・遷移なし → 全体フェード
        sdArr.push(null);sdBg.push('');sdBo.push('');
        fdArr.push([sv,ev]);fdBg.push(c.f);fdBo.push(c.fb);
        mdArr.push(null);mdBg.push('');mdBo.push('');
      } else {
        // 時刻なし → バーなし
        sdArr.push(null);sdBg.push('');sdBo.push('');
        fdArr.push(null);fdBg.push('');fdBo.push('');
        mdArr.push(null);mdBg.push('');mdBo.push('');
      }
    }
  });

  // 凡例
  document.getElementById('ganttLegend').innerHTML=`
    <div class="gantt-legend-item"><div class="gantt-legend-swatch" style="background:rgba(224,85,85,.72);border:1px solid #e05555"></div>赤羽（空き）</div>
    <div class="gantt-legend-item"><div class="gantt-legend-swatch" style="background:rgba(85,153,224,.72);border:1px solid #5599e0"></div>蕨（空き）</div>
    <div class="gantt-legend-item"><div class="gantt-legend-swatch" style="background:rgba(224,85,85,.18);border:1.5px dashed rgba(224,85,85,.6)"></div>満了後（残シフト）</div>
    <div class="gantt-legend-item"><div class="gantt-legend-swatch" style="background:rgba(255,55,55,.95)"></div>満了時刻</div>
    <div class="gantt-legend-item"><div class="gantt-legend-swatch" style="background:transparent;border-top:2px dashed rgba(255,80,80,.8)"></div>現在時刻</div>
  `;

  document.getElementById('ganttChart').style.height=Math.max(220,labels.length*36)+'px';

  new Chart(document.getElementById('ganttChart').getContext('2d'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'出勤中',data:sdArr,backgroundColor:sdBg,borderColor:sdBo,borderWidth:1,borderRadius:3,borderSkipped:false,order:3},
      {label:'満了後',data:fdArr,backgroundColor:fdBg,borderColor:fdBo,borderWidth:1.5,borderDash:[5,4],borderRadius:0,borderSkipped:false,order:3},
      {label:'満了',  data:mdArr,backgroundColor:mdBg,borderColor:mdBo,borderWidth:2,borderRadius:0,borderSkipped:false,order:1},
    ]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          title:ctx=>ctx[0]?.label||'',
          label:ctx=>{
            const v=ctx.raw;if(!Array.isArray(v))return'';
            return`${ctx.dataset.label}: ${floatToDisplay(v[0])}〜${floatToDisplay(v[1])}`;
          },
        }},
        annotation:{annotations:annots},
      },
      scales:{
        x:{min:HSTART,max:HEND,
          ticks:{color:'#7a7a90',stepSize:2,
            callback:v=>{const h=v>=24?v-24:v;return`${v>=24?'翌':''}${String(h).padStart(2,'0')}:00`;}},
          grid:{color:'#2a2a35'}},
        y:{ticks:{color:'#e8e8f0',font:{size:11}},grid:{display:false}},
      },
    },
  });
})();

// ── WEEKLY TAB ────────────────────────────────────────────────────────────
(function(){
  const dates=DATA.week_dates;
  const labels=dates.map(d=>{const day=['日','月','火','水','木','金','土'][new Date(d).getDay()];return d.slice(5).replace('-','/')+'('+day+')';});
  const LC={'赤羽ルーム':{bg:'rgba(224,85,85,.6)',bo:'#e05555'},'蕨ルーム':{bg:'rgba(85,153,224,.6)',bo:'#5599e0'}};
  const sdl={};DATA.daily_location_summary.forEach(r=>{if(!sdl[r.schedule_date])sdl[r.schedule_date]={};sdl[r.schedule_date][r.location]=r.staff_count;});
  const lo=['赤羽ルーム','蕨ルーム'];
  new Chart(document.getElementById('weeklyBarChart'),{type:'bar',data:{labels,datasets:lo.map(loc=>({
    label:loc,data:dates.map(d=>(sdl[d]||{})[loc]||0),
    backgroundColor:LC[loc].bg,borderColor:LC[loc].bo,borderWidth:1,borderRadius:4,
  }))},options:{responsive:true,plugins:{legend:{labels:{color:'#7a7a90',font:{size:11}}}},
    scales:{x:{stacked:true,ticks:{color:'#7a7a90'},grid:{color:'#2a2a35'}},y:{stacked:true,ticks:{color:'#7a7a90',precision:0},grid:{color:'#2a2a35'}}}}});

  const scMap={};DATA.shift_coverage.forEach(r=>{scMap[r.schedule_date]=r;});
  new Chart(document.getElementById('shiftChart'),{type:'bar',data:{labels,datasets:[
    {label:'昼帯(<18時)',data:dates.map(d=>(scMap[d]||{}).day_count||0),backgroundColor:'rgba(234,179,8,.5)',borderColor:'#eab308',borderWidth:1,borderRadius:4},
    {label:'夜帯(18時~)',data:dates.map(d=>(scMap[d]||{}).night_count||0),backgroundColor:'rgba(129,77,255,.5)',borderColor:'#8147ff',borderWidth:1,borderRadius:4},
  ]},options:{responsive:true,plugins:{legend:{labels:{color:'#7a7a90',font:{size:11}}}},
    scales:{x:{stacked:true,ticks:{color:'#7a7a90'},grid:{color:'#2a2a35'}},y:{stacked:true,ticks:{color:'#7a7a90',precision:0},grid:{color:'#2a2a35'}}}}});

  const maxC=Math.max(...DATA.daily_location_summary.map(r=>r.staff_count),1);
  const head=`<tr><th>店舗</th>${labels.map(l=>`<th>${l}</th>`).join('')}</tr>`;
  const body=lo.map(loc=>`<tr><th>${locPill(loc)}</th>${dates.map(d=>{const cnt=(sdl[d]||{})[loc]||0;return`<td class="heatmap-${Math.min(4,Math.round(cnt/maxC*4))}">${cnt||''}</td>`;}).join('')}</tr>`).join('');
  document.getElementById('heatmapTable').innerHTML=`<thead>${head}</thead><tbody>${body}</tbody>`;
})();

// ── STATS TAB ─────────────────────────────────────────────────────────────
(function(){
  function speedClass(h){
    if(h<2)return['speed-lightning','⚡ Lightning (<2h)'];
    if(h<6)return['speed-moderate','🔥 Moderate (2-6h)'];
    return['speed-gradual','🌿 Gradual (>6h)'];
  }
  const ranking=DATA.popularity_ranking,maxD=Math.max(...ranking.map(r=>r.booked_days),1);
  document.getElementById('rankGrid').innerHTML=ranking.length?ranking.map((r,i)=>{
    const[cls,lbl]=speedClass(r.avg_hours_to_book);
    return`<div class="rank-card"><div class="rank-num">#${i+1}</div><div class="rank-name">${therapistLink(r.therapist_id,r.name)}</div><span class="rank-speed ${cls}">${lbl}</span><div style="font-size:.75rem;color:var(--muted);margin-top:6px">平均 ${r.avg_hours_to_book}h で満了 / ${r.booked_days}日計測</div><div class="rank-bar-bg"><div class="rank-bar" style="width:${Math.round(r.booked_days/maxD*100)}%"></div></div></div>`;
  }).join(''):'<div class="no-data">スナップショットデータが不足しています（監視継続中）</div>';

  const stats=DATA.therapist_stats.slice(0,20);
  new Chart(document.getElementById('freqChart'),{type:'bar',data:{labels:stats.map(s=>s.name),datasets:[{
    label:'シフト数（直近30日）',data:stats.map(s=>s.shift_count),
    backgroundColor:stats.map(s=>s.locations?.includes('赤羽')?'rgba(224,85,85,.6)':'rgba(85,153,224,.6)'),
    borderColor:stats.map(s=>s.locations?.includes('赤羽')?'#e05555':'#5599e0'),borderWidth:1,borderRadius:4,
  }]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:'#7a7a90',precision:0},grid:{color:'#2a2a35'}},y:{ticks:{color:'#e8e8f0',font:{size:11}},grid:{display:false}}}}});
  document.getElementById('freqChart').parentElement.style.height=Math.max(200,stats.length*30)+'px';

  const rankMap={};DATA.popularity_ranking.forEach((r,i)=>{rankMap[r.therapist_id]={...r,rank:i+1};});
  document.getElementById('statsTableBody').innerHTML=DATA.therapist_stats.map(s=>{
    const rk=rankMap[s.therapist_id];
    const st=rk?`<span class="rank-speed ${speedClass(rk.avg_hours_to_book)[0]}" style="font-size:.7rem">${speedClass(rk.avg_hours_to_book)[1]}</span>`:'—';
    return`<tr><td>${therapistLink(s.therapist_id,s.name)}</td><td>${s.shift_count}</td><td>${s.avg_hours!=null?s.avg_hours+'h':'—'}</td><td>${locPill(s.locations||'—')}</td><td>${st}</td></tr>`;
  }).join('')||'<tr><td colspan="5" class="no-data">データなし</td></tr>';
})();

// ── MONITOR LOG ───────────────────────────────────────────────────────────
(function(){
  document.getElementById('snapshotBody').innerHTML=DATA.today_snapshots.length
    ?DATA.today_snapshots.map(s=>{
        const shift=s.start_time?`${displayTime(s.start_time)}〜${displayTime(s.end_time)}`:'—';
        return`<tr><td>${s.checked_at.slice(11,16)}</td><td>${therapistLink(s.therapist_id,s.therapist_name)}</td><td>${locPill(s.location)}</td><td class="${s.status==='available'?'status-available':'status-booked'}">${s.status==='available'?'空き':'満了'}</td><td style="color:var(--muted)">${shift}</td></tr>`;
      }).join('')
    :'<tr><td colspan="5" class="no-data">本日のスナップショットなし</td></tr>';
  document.getElementById('logBody').innerHTML=DATA.scrape_logs.map(l=>
    `<tr><td>${l.run_at}</td><td>${l.task_type}</td><td>${l.target_date||'—'}</td><td>${l.records_found}</td><td class="${l.success?'success-ok':'success-ng'}">${l.success?'✓ OK':'✗ NG: '+l.error_message}</td></tr>`
  ).join('')||'<tr><td colspan="5" class="no-data">ログなし</td></tr>';
})();
</script>
</body>
</html>
