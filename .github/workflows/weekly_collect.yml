name: Weekly Collect & Deploy Dashboard

on:
  schedule:
    # JST 6:00 = UTC 21:00 (前日)
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx beautifulsoup4

      - name: Initialize DB
        run: python scripts/db_setup.py

      - name: Weekly collect
        run: python scripts/weekly_collector.py

      - name: Daily monitor snapshot
        run: python scripts/daily_monitor.py

      - name: Export JSON
        run: python scripts/export_data.py

      - name: Build dashboard HTML
        run: |
          python -c "
          import json, shutil, os
          with open('data/dashboard_data.json', encoding='utf-8') as f:
              data_str = f.read()
          with open('dashboards/dashboard_template.html', encoding='utf-8') as f:
              template = f.read()
          html = template.replace('DASHBOARD_DATA_PLACEHOLDER', data_str)
          os.makedirs('docs', exist_ok=True)
          with open('docs/index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print('Dashboard built.')
          "

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mabuispa.db data/dashboard_data.json docs/index.html
          git diff --staged --quiet || git commit -m "chore: auto update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
