name: Availability Monitor (30min)

on:
  schedule:
    # 営業時間 JST 10:00〜翌5:00 に合わせて UTC 1:00〜20:00 の30分毎
    # UTC  1:00 = JST 10:00  (営業開始)
    # UTC 20:00 = JST 翌5:00 (営業終了)
    - cron: '0,30 1-20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx beautifulsoup4

      - name: Initialize DB (冪等)
        run: python scripts/db_setup.py

      - name: Snapshot today's availability
        run: python scripts/daily_monitor.py

      - name: Commit DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add data/mabuispa.db
          git diff --staged --quiet || git commit -m "monitor: snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
